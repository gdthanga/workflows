name: Docker CI Test
on:
  push:
    branches: ["main"]
jobs:
  docker-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t dotnet-image -f dotnet/Dockerfile dotnet

      - name: Run container
        run: docker run -d -p 8080:8080 --name test-container dotnet-image

      - name: Wait for startup
        run: sleep 5

      - name: Test endpoint
        run: curl -f http://localhost:8080

      - name: Show logs if failed
        if: failure()
        run: docker logs test-container

      - name: Stop container
        if: always()
        run: docker stop test-container
